version: '3.8'

services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: petcare-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: petcare_db
      MYSQL_USER: ${MYSQL_USER:-petcare}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-petcare123}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ../database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - petcare-network
    restart: unless-stopped

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: petcare-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - petcare-network
    restart: unless-stopped
    command: redis-server --appendonly yes

  # 后端服务
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: petcare-backend
    environment:
      NODE_ENV: production
      PORT: 3000
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: petcare
      MYSQL_PASSWORD: petcare123
      MYSQL_DATABASE: petcare_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-your-secret-key-change-in-production}
    ports:
      - "3000:3000"
    depends_on:
      - mysql
      - redis
    networks:
      - petcare-network
    restart: unless-stopped

  # 前端服务 (Nginx)
  nginx:
    image: nginx:alpine
    container_name: petcare-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ../frontend/dist:/usr/share/nginx/html
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - backend
    networks:
      - petcare-network
    restart: unless-stopped

volumes:
  mysql_data:
  redis_data:

networks:
  petcare-network:
    driver: bridge
